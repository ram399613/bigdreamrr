<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - BIG DREAM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">BIG DREAM</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="aims.html">Our Aims</a>
        <a href="goals.html">Goal Planner</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="active">Login</a>
        <button class="mode-toggle" onclick="toggleMode()">🌙</button>
    </nav>
</header>

<section class="content">
    <h2>User Login</h2>

    <form class="goal-form login-form">
        <label>Username or Email</label>
        <input type="text" placeholder="Enter username or email">

        <label>Password</label>
        <input type="password" placeholder="Enter password">

        <button type="button">Login (Demo Only)</button>
        <p class="signup-text">Don't have an account? <a href="register.html">Register</a></p>
    </form>
</section>

<footer>
    BIG DREAM &copy; 2025 | Dream Big, Act Now.
</footer>

<script type="module">
 import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsmwMzGeL6ZQUKom6LYX33JQYXcOV3MO4",
    authDomain: "bigdream-rr.firebaseapp.com",
    projectId: "bigdream-rr",
    storageBucket: "bigdream-rr.firebasestorage.app",
    messagingSenderId: "577303163510",
    appId: "1:577303163510:web:414e36ca824f0cbd1ca557",
    measurementId: "G-QL3CVWN3R8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 🔐 YOUR ADMIN EMAIL
  const adminEmails = ["bigdreamadmin@gmail.com"];

  document.getElementById("login-btn").addEventListener("click", function () {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-pass").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        if (adminEmails.includes(email)) {
          window.location.href = "admin.html";   // Admin goes here
        } else {
          window.location.href = "dashboard.html"; // Normal user here
        }
      })
      .catch((error) => {
        alert(error.message);
      });
  });
</script>

</body>
</html>
