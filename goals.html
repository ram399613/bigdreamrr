<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goal Planner - BIG DREAM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">BIG DREAM</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="aims.html">Our Aims</a>
        <a href="goals.html" class="active">Goal Planner</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
        <button class="mode-toggle" onclick="toggleMode()">🌙</button>
    </nav>
</header>

<section class="content">
    <h2>Create Your Goal Plan</h2>

    <form class="goal-form">
        <label>Your Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Your Big Dream</label>
        <textarea placeholder="Write your dream..."></textarea>

        <label>First Step You Will Take</label>
        <textarea placeholder="Write your first step..."></textarea>

        <label>Timeline</label>
        <input type="text" placeholder="e.g. 6 months, 1 year">

        <button type="button" onclick="downloadPDF()">Download as PDF</button>
    </form>
    <p class="note">* This is a static demo. Data will not be saved.</p>
</section>

<footer>
    BIG DREAM &copy; 2025 | Dream Big, Act Now.
</footer>

<script>
function toggleMode() {
document.body.classList.toggle("light-mode");
}
function downloadPDF() {
alert("PDF Download feature will work when backend is added!");
}
</script>

</body>
</html>
