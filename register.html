<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - BIG DREAM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   


<header>
    <h1 class="logo">BIG DREAM</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="aims.html">Our Aims</a>
        <a href="goals.html">Goal Planner</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
        <a href="register.html" class="active">Register</a>
        <button class="mode-toggle" onclick="toggleMode()">🌙</button>
    </nav>
</header>

<section class="content">
    <h2>Create an Account</h2>

<form class="goal-form login-form" method="POST">
    <label>Full Name</label>
    <input type="text" name="name" placeholder="Enter full name" required>

    <label>Email</label>
    <input type="email" name="email" placeholder="Enter email" required>

    <label>Username</label>
    <input type="text" name="username" placeholder="Choose a username" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Create password" required>

    <label>Confirm Password</label>
    <input type="password" name="confirm" placeholder="Confirm password" required>

    <button type="submit">Register</button>
    <p class="signup-text">Already have an account? <a href="login.html">Login</a></p>
</form>

</section>

<footer>
    BIG DREAM &copy; 2025 | Dream Big, Act Now.
</footer>

<script>
function toggleMode() {
document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
