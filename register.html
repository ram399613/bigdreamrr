<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - BIG DREAM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">BIG DREAM</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="aims.html">Our Aims</a>
        <a href="goals.html">Goal Planner</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
        <a href="register.html" class="active">Register</a>
        <button class="mode-toggle" onclick="toggleMode()">🌙</button>
    </nav>
</header>

<section class="content">
    <h2>Create an Account</h2>

    <form class="goal-form login-form">
        <label>Full Name</label>
        <input type="text" placeholder="Enter full name">

        <label>Email</label>
        <input type="email" placeholder="Enter email">

        <label>Username</label>
        <input type="text" placeholder="Choose a username">

        <label>Password</label>
        <input type="password" placeholder="Create password">

        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password">

        <button type="button">Register (Demo Only)</button>
        <p class="signup-text">Already have an account? <a href="login.html">Login</a></p>
    </form>
</section>

<footer>
    BIG DREAM &copy; 2025 | Dream Big, Act Now.
</footer>

<script>
mport { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsmwMzGeL6ZQUKom6LYX33JQYXcOV3MO4",
    authDomain: "bigdream-rr.firebaseapp.com",
    projectId: "bigdream-rr",
    storageBucket: "bigdream-rr.firebasestorage.app",
    messagingSenderId: "577303163510",
    appId: "1:577303163510:web:414e36ca824f0cbd1ca557",
    measurementId: "G-QL3CVWN3R8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById("reg-btn").addEventListener("click", function(){
    const email = document.getElementById("reg-email").value;
    const password = document.getElementById("reg-pass").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        alert("Account Created Successfully!");
        window.location.href = "login.html";
      })
      .catch((error) => {
        alert(error.message);
      });
});

</script>

</body>
</html>
